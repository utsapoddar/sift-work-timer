name: work_timer
description: "Work session timer with automatic break scheduling."
publish_to: 'none'

version: 1.0.8+8

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  audioplayers: ^6.1.0
  file_picker: ^10.3.10
  shared_preferences: ^2.3.0
  google_fonts: ^8.0.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/alarm.wav
    - assets/alarm.mp3
    - assets/alarm.caf
